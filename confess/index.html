<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Anonymous Confession</title>
</head>
<body>

  <h2>Send an anonymous message</h2>

  <form id="confessForm">
    <textarea
      name="message"
      placeholder="Type your confession..."
      required
      rows="6"
    ></textarea>
    <br><br>
    <button type="submit">Send</button>
  </form>

  <p id="status"></p>

  <script src="script.js"></script>
</body>
</html>
