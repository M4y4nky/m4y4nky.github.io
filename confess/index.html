<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Anonymous Confession</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      width: 90%;
      max-width: 400px;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #000;
      color: #fff;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      resize: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: #4caf50;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #555;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Anonymous Confession</h2>

    <form id="confessForm">
      <textarea
        name="message"
        placeholder="Write something anonymously..."
        required
      ></textarea>

      <button type="submit">Send</button>
    </form>

    <div id="status"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
