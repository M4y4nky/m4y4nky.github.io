<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Confess</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a1a1a, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      width: 92%;
      max-width: 420px;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 22px;
      margin: 0 0 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.6;
      text-align: center;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      background: #0b0b0b;
      color: #fff;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      resize: none;
      outline: none;
    }

    textarea::placeholder {
      color: #555;
    }

    .count {
      text-align: right;
      font-size: 12px;
      opacity: 0.5;
      margin-top: 4px;
    }

    button {
      margin-top: 14px;
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #00c853, #00e676);
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s;
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      min-height: 18px;
    }

    .success {
      color: #00e676;
    }

    .error {
      color: #ff5252;
    }

    .lock {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      opacity: 0.4;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Anonymous Confession</h1>
    <div class="subtitle">No login • No tracking • Fully anonymous</div>

    <form id="confessForm">
      <textarea
        name="message"
        maxlength="500"
        placeholder="Type what you never said..."
        required
      ></textarea>

      <div class="count">
        <span id="count">0</span>/500
      </div>

      <button type="submit">Send anonymously</button>
    </form>

    <div id="status" class="status"></div>

    <div class="lock">🔒 Your identity is never stored</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
