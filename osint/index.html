<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4Y4NKY OSINT TERMINAL</title>
    <style>
        /* PC & Mobile Friendly Professional Theme */
        :root {
            --primary: #39ff14;
            --bg: #010409;
            --border: #30363d;
        }

        body {
            background: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .terminal-container {
            width: 100%;
            max-width: 900px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            background: #0d1117;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.1);
        }

        h2 {
            font-size: 1.2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        /* Flexbox for Input Controls - Responsive */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        select, input, button {
            background: #161b22;
            color: var(--primary);
            border: 1px solid var(--border);
            padding: 12px;
            font-size: 14px;
            outline: none;
            border-radius: 4px;
            flex: 1 1 200px; /* PC par line mein, Mobile par stack */
        }

        button {
            background: #238636;
            color: white;
            font-weight: bold;
            flex: 1 1 100%; /* Button mobile par poori width lega */
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary);
            color: black;
        }

        /* Results Box - Mobile Friendly Scrolling */
        #json-output {
            margin-top: 20px;
            background: #000;
            border: 1px dashed var(--border);
            padding: 15px;
            font-size: 13px;
            color: #00ff00;
            overflow-x: auto; /* Mobile par JSON bada ho toh scroll ho jaye */
            white-space: pre-wrap;
            min-height: 200px;
        }

        /* Media Query for PC specific adjustments */
        @media (min-width: 768px) {
            button { flex: 1 1 150px; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <h2>💠 M4Y4NKY OSINT TERMINAL</h2>
    
    <div class="controls">
        <select id="api_cmd">
            <option value="gh">📂 GITHUB</option>
            <option value="tg">💬 TELEGRAM</option>
            <option value="insta">📸 INSTAGRAM</option>
            <option value="num">📱 PHONE (IN)</option>
            <option value="pak">🇵🇰 PAKISTAN NUM</option>
            <option value="ip">🌐 IP LOOKUP</option>
            <option value="ifsc">🏦 IFSC SEARCH</option>
            <option value="pincode">📍 PINCODE</option>
            <option value="email">📧 EMAIL CHECK</option>
            <option value="ff">🎮 FREE FIRE</option>
        </select>
        
        <input type="text" id="api_query" placeholder="Enter Username/ID/Number...">
        <button onclick="fetchDirectJson()">RUN SEARCH</button>
    </div>

    <div id="json-output">// RAW JSON OUTPUT WILL APPEAR HERE...</div>
</div>

<script>
    async function fetchDirectJson() {
        const cmd = document.getElementById('api_cmd').value;
        const q = document.getElementById('api_query').value;
        const output = document.getElementById('json-output');
        
        if(!q) { alert("Please enter target data!"); return; }

        output.innerText = "🔍 Connecting to Backend Securely...";
        
        try {
            // Worker URL
            const response = await fetch(`https://m4y4nky-api.m4y4nky.workers.dev/?cmd=${cmd}&q=${q}`);
            const data = await response.json();
            
            // Direct JSON Formatting
            output.innerText = JSON.stringify(data, null, 4);
        } catch (e) {
            output.innerText = "❌ Connection Failed! Make sure Worker is deployed.";
        }
    }
</script>

</body>
</html>
