<!DOCTYPE html>
<html>
<head>
  <title>OSINT AI Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e2e8f0;
    }

    header {
      text-align: center;
      padding: 25px;
      font-size: 22px;
      letter-spacing: 3px;
      color: #38bdf8;
      text-shadow: 0 0 15px #0ea5e9;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .panel {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid #0ea5e9;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 0 40px rgba(14,165,233,0.2);
    }

    select, input {
      padding: 12px;
      width: 220px;
      background: #020617;
      border: 1px solid #0ea5e9;
      color: #38bdf8;
      border-radius: 6px;
      margin-right: 10px;
      outline: none;
    }

    button {
      padding: 12px 18px;
      background: #0ea5e9;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      box-shadow: 0 0 20px #0ea5e9;
      transform: scale(1.05);
    }

    .result {
      margin-top: 25px;
      background: #020617;
      border: 1px solid #0ea5e9;
      border-radius: 12px;
      padding: 20px;
      overflow-x: auto;
      white-space: pre-wrap;
      font-size: 14px;
      box-shadow: inset 0 0 25px rgba(14,165,233,0.15);
    }

    .loading {
      color: #facc15;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }
  </style>
</head>

<body>

<header>OSINT AI FUTURE TERMINAL</header>

<div class="container">
  <div class="panel">
    <select id="type">
      <option value="github">GitHub</option>
      <option value="pincode">Pincode</option>
      <option value="telegram">Telegram</option>
      <option value="ifsc">IFSC</option>
      <option value="ip">IP</option>
      <option value="email">Email</option>
      <option value="phone">Phone</option>
    </select>

    <input type="text" id="value" placeholder="Enter target...">
    <button onclick="scan()">SCAN</button>

    <div id="result" class="result">
      Awaiting target input...
    </div>
  </div>
</div>

<script>

function scan() {

  const type = document.getElementById("type").value;
  const value = document.getElementById("value").value;
  const result = document.getElementById("result");

  if (!value) {
    result.textContent = ">> No target provided.";
    return;
  }

  result.innerHTML = `<span class="loading">>> Scanning ${value}...</span>`;

  fetch(`https://osint-backend-black.vercel.app/api/osint?type=${type}&value=${value}`)
    .then(res => res.json())
    .then(data => {
      result.textContent = JSON.stringify(data, null, 2);
    })
    .catch(() => {
      result.textContent = ">> Connection failure.";
    });
}

</script>

</body>
</html>
