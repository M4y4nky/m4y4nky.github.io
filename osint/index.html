<!DOCTYPE html>
<html>
<head>
  <title>OSINT Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    header {
      background: #111827;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    .search-box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    select, input {
      padding: 10px;
      margin-right: 10px;
      width: 200px;
    }

    button {
      padding: 10px 15px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    .card {
      background: white;
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .row {
      margin-bottom: 10px;
    }

    .label {
      font-weight: bold;
      color: #374151;
    }

    .value {
      color: #111827;
    }

    pre {
      background: #111827;
      color: #00ff88;
      padding: 15px;
      overflow-x: auto;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<header>OSINT Dashboard</header>

<div class="container">

  <div class="search-box">
    <select id="type">
      <option value="github">GitHub</option>
      <option value="pincode">Pincode</option>
      <option value="telegram">Telegram</option>
      <option value="ifsc">IFSC</option>
      <option value="ip">IP</option>
      <option value="email">Email</option>
      <option value="phone">Phone</option>
    </select>

    <input type="text" id="value" placeholder="Enter value">
    <button onclick="search()">Search</button>
  </div>

  <div id="result"></div>

</div>

<script>

function row(label, value) {
  return `
    <div class="row">
      <span class="label">${label}: </span>
      <span class="value">${value ?? "N/A"}</span>
    </div>
  `;
}

function search() {

  const type = document.getElementById("type").value;
  const value = document.getElementById("value").value;
  const result = document.getElementById("result");

  if (!value) {
    alert("Enter a value");
    return;
  }

  result.innerHTML = `<div class="card">Loading...</div>`;

  fetch(`https://osint-backend-black.vercel.app/api/osint?type=${type}&value=${value}`)
  .then(res => res.json())
  .then(data => {

    let output = `<div class="card">`;

    if (type === "github") {
      output += row("Username", data.login);
      output += row("Name", data.name);
      output += row("Followers", data.followers);
      output += row("Repos", data.public_repos);
      output += row("Profile", data.html_url);
    }

    else if (type === "ip") {
      output += row("IP", data.ip);
      output += row("Country", data.country);
      output += row("Region", data.region);
      output += row("ISP", data.isp);
    }

    else {
      output += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
    }

    output += `</div>`;
    result.innerHTML = output;

  })
  .catch(error => {
    result.innerHTML = `<div class="card">Error fetching data.</div>`;
  });
}

</script>

</body>
</html>
