<!DOCTYPE html>
<html>
<head>
  <title>OSINT Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .box {
      background: #1c1c1c;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
    }
    input {
      width: 70%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      padding: 8px 12px;
      margin-left: 5px;
      cursor: pointer;
      background: #00ff99;
      border: none;
    }
    pre {
      background: #000;
      padding: 10px;
      margin-top: 10px;
      overflow-x: auto;
      max-height: 300px;
    }
  </style>
</head>

<body>

<h1>OSINT Multi Tool</h1>

<div class="box">
  <h3>Search</h3>
  <select id="type">
    <option value="github">GitHub</option>
    <option value="pincode">Pincode</option>
    <option value="telegram">Telegram</option>
    <option value="ifsc">IFSC</option>
    <option value="ip">IP</option>
    <option value="email">Email</option>
    <option value="phone">Phone</option>
  </select>

  <input type="text" id="value" placeholder="Enter value here">
  <button onclick="search()">Search</button>

  <pre id="result"></pre>
</div>

<script>

function search() {

  const type = document.getElementById("type").value;
  const value = document.getElementById("value").value;
  const resultBox = document.getElementById("result");

  if (!value) {
    resultBox.textContent = "Please enter a value.";
    return;
  }

  resultBox.textContent = "Loading...";

  fetch(`https://osint-backend-black.vercel.app/api/osint?type=${type}&value=${value}`)
    .then(res => res.json())
    .then(data => {
      resultBox.textContent = JSON.stringify(data, null, 2);
    })
    .catch(err => {
      resultBox.textContent = "Error fetching data.";
    });
}

</script>

</body>
</html>
