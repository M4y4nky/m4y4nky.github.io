<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M4Y4NKY OSINT PRO</title>
    <style>
        :root {
            --bg: #0f111a;
            --glass: rgba(25, 27, 38, 0.95);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #89b4fa;
            --green: #a6e3a1;
            --dim: #7f849c;
            --text: #cdd6f4;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #1e1e2e, #0f111a);
            font-family: 'SF Mono', 'Cascadia Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            padding: 15px;
            overflow: hidden;
        }

        .window {
            width: 100%; max-width: 480px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 16px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .title-bar {
            height: 42px; background: rgba(17, 17, 27, 0.8);
            display: flex; align-items: center; padding: 0 18px;
            position: relative;
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .d-red { background: #ff5f56; } .d-yel { background: #ffbd2e; } .d-grn { background: #27c93f; }

        .window-title { position: absolute; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--dim); font-weight: bold; }

        .screen { flex: 1; padding: 25px; overflow-y: auto; scrollbar-width: none; color: var(--text); font-size: 13px; }
        .screen::-webkit-scrollbar { display: none; }

        .intel-card {
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px; margin: 20px 0; animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-tag { color: var(--green); font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; }
        .card-tag::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .data-grid { display: grid; grid-template-columns: 95px 1fr; gap: 8px 10px; }
        .label { color: var(--dim); font-weight: bold; font-size: 12px; }
        .val { color: var(--text); word-break: break-all; line-height: 1.5; }
        .v-blue { color: var(--accent); font-weight: bold; }

        .search-area { padding: 15px; background: rgba(17, 17, 27, 0.95); border-top: 1px solid var(--border); flex-shrink: 0; }
        .input-wrapper { display: flex; width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        select { background: none; border: none; color: var(--green); font-family: inherit; font-size: 11px; font-weight: bold; outline: none; padding: 0 10px; border-right: 1px solid var(--border); }
        input { flex: 1; background: none; border: none; outline: none; color: var(--accent); font-family: inherit; font-size: 16px; padding: 10px; width: 0; }
        .search-btn { background: var(--accent); color: #111; border: none; padding: 0 15px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .clear-link { display: block; width: 100%; text-align: center; color: var(--dim); font-size: 10px; margin-top: 10px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div class="dots"><div class="dot d-red"></div><div class="dot d-yel"></div><div class="dot d-grn"></div></div>
        <div class="window-title">m4y4nky — Private — OSINT</div>
    </div>
    <div class="screen" id="screen">
        <span class="v-green">--- M4Y4NKY SYSTEM V7.7 ---</span><br>
        <span style="color:var(--dim)">Targeting GitHub & Telegram Intelligence.</span>
    </div>
    <div class="search-area">
        <div class="input-wrapper">
            <select id="module">
                <option value="github">GITHUB</option>
                <option value="telegram">TELEGRAM</option>
            </select>
            <input id="target" type="text" placeholder="Enter query..." autocomplete="off">
            <button class="search-btn" onclick="startSearch()">SCAN</button>
        </div>
        <div class="clear-link" onclick="clearScreen()">Clear Terminal</div>
    </div>
</div>

<script>
    const screen = document.getElementById("screen");
    const targetInput = document.getElementById("target");
    const moduleSelect = document.getElementById("module");
    const PROXY_URL = "https://osint-backend-black.vercel.app/api/osint";

    function print(txt) {
        const div = document.createElement("div");
        div.innerHTML = txt;
        screen.appendChild(div);
        screen.scrollTop = screen.scrollHeight;
    }

    function clearScreen() { screen.innerHTML = '<span class="v-green">Terminal Cleared.</span><br>'; }

    async function startSearch() {
        const type = moduleSelect.value;
        const value = targetInput.value.trim();
        if (!value) return print("<span style='color:var(--red)'><br>[!] Error: No target entered.</span>");
        
        targetInput.value = "";
        print(`<br><span style="color:var(--green)">m4y4nky:~$</span> ${type} ${value}`);

        try {
            const res = await fetch(`${PROXY_URL}?type=${type}&value=${value}`);
            const data = await res.json();
            if (res.status !== 200) throw new Error(data.error);

            if (type === "github") {
                print(`<div class="intel-card">
                    <span class="card-tag">GitHub Dossier</span>
                    <div class="data-grid">
                        <span class="label">Name:</span><span class="val v-green">${data.name || "N/A"}</span>
                        <span class="label">Mail:</span><span class="val v-blue">${data.email || data.recovered_email || "Private"}</span>
                        <span class="label">Repos:</span><span class="val">${data.public_repos || 0}</span>
                        <span class="label">URL:</span><span class="val v-blue">${data.html_url}</span>
                    </div>
                </div>`);
            } else if (type === "telegram") {
                const tg = data.data || data;
                print(`<div class="intel-card">
                    <span class="card-tag">Telegram Intel</span>
                    <div class="data-grid">
                        <span class="label">User ID:</span><span class="val v-blue">${tg.id}</span>
                        <span class="label">First Name:</span><span class="val v-green">${tg.first_name || "N/A"}</span>
                        <span class="label">Active:</span><span class="val">${tg.is_active ? "Yes" : "No"}</span>
                        <span class="label">Admin In:</span><span class="val v-green">${tg.adm_in_groups || 0}</span>
                        <span class="label">Total Msgs:</span><span class="val">${tg.total_msg_count || 0}</span>
                    </div>
                </div>`);
            }
        } catch (e) {
            print(`<span style='color:var(--red)'><br>[!] Error: ${e.message}</span>`);
        }
    }

    targetInput.addEventListener("keydown", (e) => { if (e.key === "Enter") startSearch(); });
</script>
</body>
</html>
