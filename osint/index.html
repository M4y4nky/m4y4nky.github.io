<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4y4nky’s OSINT</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html,body{
margin:0;
height:100%;
background:#0c0c0c;
font-family:ui-monospace,Menlo,monospace;
color:#e6e6e6;
}

.wrapper{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:16px;
}

.terminal{
width:100%;
max-width:760px;
background:#000;
border-radius:14px;
border:1px solid #2a2a2a;
box-shadow:0 30px 80px rgba(0,0,0,.6);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#1a1a1a;
padding:10px 14px;
display:flex;
align-items:center;
justify-content:space-between;
font-size:13px;
border-bottom:1px solid #222;
}

.dots{display:flex;gap:6px;}
.dot{width:12px;height:12px;border-radius:50%;}
.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

.console{
flex:1;
overflow-y:auto;
padding:16px;
font-size:14px;
}

.input-bar{
display:flex;
gap:8px;
padding:12px 16px;
border-top:1px solid #222;
}

.prompt{
color:#00ff88;
font-weight:600;
white-space:nowrap;
}

input{
flex:1;
background:transparent;
border:none;
outline:none;
color:#fff;
font-family:inherit;
font-size:14px;
min-width:0;
text-transform:lowercase;
}

.success{color:#00ff88;}
.error{color:#ff4d4d;}
.info{color:#4da6ff;}

@media(max-width:640px){
.wrapper{align-items:flex-start;padding-top:24px;}
.console{font-size:13px;}
input{font-size:13px;}
}
</style>
</head>

<body>

<div class="wrapper">
<div class="terminal">

<div class="header">
<div class="dots">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
</div>
<div>M4y4nky’s OSINT</div>
<div class="text-gray-500 text-xs">terminal</div>
</div>

<div id="console" class="console">
Type <span class="info">help</span> to begin.
</div>

<div class="input-bar">
<div class="prompt">m4y4nky@system:~$</div>
<input id="cmd" autocomplete="off" spellcheck="false">
</div>

</div>
</div>

<script>
const consoleEl=document.getElementById("console");
const input=document.getElementById("cmd");

function print(text,className=""){
const line=document.createElement("div");
if(className) line.className=className;
line.textContent=text;
consoleEl.appendChild(line);
consoleEl.scrollTop=consoleEl.scrollHeight;
}

/* FORCE LOWERCASE */
input.addEventListener("input",()=>{
input.value=input.value.toLowerCase();
});

input.addEventListener("keydown",async(e)=>{
if(e.key==="Enter"){

let cmd=input.value.trim().toLowerCase();
if(!cmd) return;

print("m4y4nky@system:~$ "+cmd,"info");
input.value="";

if(cmd==="clear"){
consoleEl.innerHTML="";
return;
}

if(cmd==="help"){
print("Available commands:","success");
print("phone <10digit_number>");
print("telegram <numeric_id>");
print("github <username>");
print("clear");
print("help");
return;
}

let parts=cmd.split(" ");
if(parts.length<2){
print("Usage: type value","error");
return;
}

let type=parts[0];
let value=parts[1];

/* VALIDATIONS */
if(type==="phone" && !/^[0-9]{10}$/.test(value)){
print("Phone must be 10 digits","error");
return;
}

if(type==="telegram" && !/^[0-9]+$/.test(value)){
print("Telegram ID must be numeric","error");
return;
}

if(type==="github" && !/^[a-z0-9-]+$/.test(value)){
print("Invalid github username format","error");
return;
}

print("Scanning...","info");

try{

const url=`https://osint-backend-black.vercel.app/api/osint?type=${type}&value=${value}`;
const res=await fetch(url);

if(!res.ok){
print("Server error "+res.status,"error");
return;
}

const data=await res.json();

/* ================= PHONE ================= */

if(type==="phone"){
if(!data.status || !data.results || data.results.length===0){
print("No phone data found","error");
return;
}

let p=data.results[0];

print("PHONE INTELLIGENCE","success");
print("Mobile: "+(p.mobile||"N/A"));
print("Name: "+(p.name||"N/A"));
print("Father: "+(p.fname||"N/A"));
print("Circle: "+(p.circle||"N/A"));
print("Gov ID: "+(p.id||"N/A"));
if(p.email) print("Email: "+p.email);
return;
}

/* ================= TELEGRAM ================= */

if(type==="telegram"){
let tg=data?.data?.data||data?.data||data;
if(!tg || !tg.id){
print("Telegram user not found","error");
return;
}

print("TELEGRAM INTELLIGENCE","success");
print("Name: "+(tg.first_name||"")+" "+(tg.last_name||""));
print("User ID: "+tg.id);
print("Groups: "+(tg.total_groups||0));
print("Messages: "+(tg.total_msg_count||0));
return;
}

/* ================= GITHUB ================= */

if(type==="github"){
if(data.message==="Not Found"){
print("Github user not found","error");
return;
}

print("GITHUB PROFILE","success");
print("Username: "+data.login);
print("Followers: "+data.followers);
print("Repos: "+data.public_repos);
print("Profile: "+data.html_url);
return;
}

}catch(err){
print("Network error","error");
}

}
});
</script>

</body>
</html>
