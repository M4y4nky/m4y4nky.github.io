<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4y4nkyâ€™s OSINT</title>

<style>
body{
background:#000;
color:#e5e5e5;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.terminal{
width:95%;
max-width:750px;
background:#000;
border:1px solid #333;
border-radius:10px;
box-shadow:0 0 40px rgba(0,255,65,0.2);
}

.header{
background:#111;
padding:10px;
display:flex;
justify-content:center;
color:#999;
border-bottom:1px solid #333;
}

.content{
padding:20px;
}

.cmd{
color:#00ff41;
margin-bottom:10px;
}

select,input{
background:#000;
color:#fff;
border:1px solid #00ff41;
padding:8px;
margin-right:5px;
font-family:monospace;
}

button{
background:#000;
color:#00ff41;
border:1px solid #00ff41;
padding:8px 14px;
cursor:pointer;
}

button:hover{
background:#00ff41;
color:#000;
}

.result{
margin-top:15px;
white-space:pre-wrap;
}

.success{color:#00ff41;}
.error{color:#ff4d4d;}
.label{color:#999;}
.value{color:#fff;}
.highlight{color:#00ff41;font-weight:bold;}

.loader{
border:2px solid #222;
border-top:2px solid #00ff41;
border-radius:50%;
width:18px;
height:18px;
animation:spin 1s linear infinite;
display:inline-block;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@media(max-width:600px){
select,input,button{
display:block;
width:100%;
margin:6px 0;
}
}
</style>
</head>

<body>

<div class="terminal">
<div class="header">M4y4nkyâ€™s OSINT</div>

<div class="content">

<div class="cmd">m4y4nky@system:~$ osint-scan</div>

<select id="type">
<option value="phone">phone</option>
<option value="telegram">telegram</option>
</select>

<input id="target" placeholder="Enter target">

<button onclick="scan()">run</button>

<label style="font-size:13px;">
<input type="checkbox" id="raw"> raw
</label>

<div id="output" class="result"></div>

</div>
</div>

<script>

const BASE = "https://YOUR-VERCEL-URL.vercel.app/api"; 
// ðŸ‘† Replace this

function showError(msg){
document.getElementById("output").innerHTML=
`<div class="error">Error: ${msg}</div>`;
}

function showLoading(){
document.getElementById("output").innerHTML=
`<span class="loader"></span> Scanning...`;
}

function showRaw(data){
document.getElementById("output").innerHTML=
`<pre>${JSON.stringify(data,null,2)}</pre>`;
}

function showPhone(data){

if(!data.status || !data.results || data.results.length===0){
showError("User not found");
return;
}

const p=data.results[0];

document.getElementById("output").innerHTML=
`
<div class="success">Phone Intelligence</div>

<span class="label">Mobile:</span> 
<span class="highlight">${p.mobile}</span>

<span class="label">Name:</span> 
<span class="value">${p.name||"N/A"}</span>

<span class="label">Father:</span> 
<span class="value">${p.fname||"N/A"}</span>

<span class="label">Circle:</span> 
<span class="value">${p.circle||"N/A"}</span>

<span class="label">Government ID:</span> 
<span class="value">${p.id||"N/A"}</span>

<span class="label">Alternate:</span> 
<span class="value">${p.alt||"N/A"}</span>

<span class="label">Email:</span> 
<span class="value">${p.email||"N/A"}</span>

<span class="label">Address:</span>
<span class="value">${(p.address||"").replace(/!!/g,", ").replace(/!/g,", ")}</span>
`;
}

function showTelegram(data){

if(!data.success || !data.data || !data.data.data){
showError("User not found");
return;
}

const t=data.data.data;

document.getElementById("output").innerHTML=
`
<div class="success">Telegram Intelligence</div>

<span class="label">Name:</span> 
<span class="value">${t.first_name||""}</span>

<span class="label">User ID:</span> 
<span class="highlight">${t.id}</span>

<span class="label">Active:</span> 
<span class="value">${t.is_active}</span>

<span class="label">Bot:</span> 
<span class="value">${t.is_bot}</span>

<span class="label">Total Messages:</span> 
<span class="value">${t.total_msg_count}</span>

<span class="label">Groups:</span> 
<span class="value">${t.total_groups}</span>

<span class="label">First Msg:</span> 
<span class="value">${t.first_msg_date}</span>

<span class="label">Last Msg:</span> 
<span class="value">${t.last_msg_date}</span>
`;
}

async function scan(){

const type=document.getElementById("type").value;
const target=document.getElementById("target").value.trim();
const raw=document.getElementById("raw").checked;

if(!target){
showError("Enter a target");
return;
}

showLoading();

let url="";

if(type==="phone")
url=`${BASE}/phone?number=${target}`;

if(type==="telegram")
url=`${BASE}/telegram?username=${target}`;

try{

const res=await fetch(url);

if(!res.ok){
showError("Server error "+res.status);
return;
}

const data=await res.json();

if(raw){
showRaw(data);
return;
}

if(type==="phone") showPhone(data);
if(type==="telegram") showTelegram(data);

}catch(e){
showError("Failed to fetch API");
}

}

</script>

</body>
</html>
