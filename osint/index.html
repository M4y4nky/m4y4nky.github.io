<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>M4Y4NKY OSINT</title>
    <style>
        body { background: #010409; color: #39ff14; font-family: 'Courier New', monospace; padding: 20px; }
        .box { border: 1px solid #30363d; padding: 20px; border-radius: 8px; max-width: 900px; margin: auto; }
        input, select, button { background: #0d1117; color: #39ff14; border: 1px solid #30363d; padding: 10px; margin: 5px; }
        button:hover { background: #238636; color: white; cursor: pointer; }
        #json-view { background: #000; border: 1px dashed #30363d; padding: 15px; margin-top: 20px; white-space: pre-wrap; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>💠 M4Y4NKY OSINT TERMINAL</h2>
        <select id="api_cmd">
            <option value="gh">GITHUB</option>
            <option value="tg">TELEGRAM</option>
            <option value="insta">INSTAGRAM</option>
            <option value="num">PHONE (IN)</option>
            <option value="pak">PAKISTAN NUM</option>
            <option value="ip">IP LOOKUP</option>
            <option value="ifsc">IFSC SEARCH</option>
            <option value="pincode">PINCODE</option>
            <option value="email">EMAIL CHECK</option>
            <option value="ff">FREE FIRE</option>
        </select>
        <input type="text" id="api_query" placeholder="Enter target data...">
        <button onclick="getOsintData()">RUN SEARCH</button>
        <div id="json-view">// Raw JSON results will appear here...</div>
    </div>

    <script>
        async function getOsintData() {
            const cmd = document.getElementById('api_cmd').value;
            const q = document.getElementById('api_query').value;
            const display = document.getElementById('json-view');
            
            display.innerText = "🔍 Connecting to m4y4nky-api...";
            
            try {
                // Tumhara Cloudflare Worker URL
                const res = await fetch(`https://m4y4nky-api.m4y4nky.workers.dev/?cmd=${cmd}&q=${q}`);
                const data = await res.json();
                
                // Direct JSON display with formatting
                display.innerText = JSON.stringify(data, null, 4);
            } catch (e) {
                display.innerText = "❌ Error: Could not fetch data.";
            }
        }
    </script>
</body>
</html>
