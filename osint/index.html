<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4y4nky’s OSINT</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
--bg:#0c0c0c;
--win:#000;
--text:#ffffff;
--dim:#555555;
--border:#333333;
--cmd:#00ff41;
--header:#1a1a1a;
}

body.light-mode{
--bg:#f0f0f0;
--win:#ffffff;
--text:#000000;
--dim:#999999;
--border:#cccccc;
--cmd:#0a7a2c;
--header:#e5e5e5;
}

body{
background:var(--bg);
color:var(--text);
font-family:ui-monospace, Menlo, monospace;
}

.terminal{
background:var(--win);
border:1px solid var(--border);
box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.header{
background:var(--header);
border-bottom:1px solid var(--border);
}

.cmd::before{
content:"m4y4nky@system:~$ ";
color:var(--cmd);
}

select,input{
background:transparent;
border:1px solid var(--border);
padding:6px 10px;
color:var(--text);
font-size:13px;
}

button{
background:transparent;
border:1px solid var(--cmd);
color:var(--cmd);
padding:6px 12px;
cursor:pointer;
}

button:hover{
background:var(--cmd);
color:#000;
}

.output{
border:1px solid var(--border);
padding:12px;
margin-top:12px;
white-space:pre-wrap;
font-size:13px;
}

.dim{color:var(--dim)}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="terminal w-full max-w-4xl rounded-lg overflow-hidden">

<!-- HEADER -->
<div class="header flex justify-between items-center px-4 py-2 text-xs">
<div class="flex gap-2">
<div class="w-3 h-3 bg-[#ff5f56] rounded-full"></div>
<div class="w-3 h-3 bg-[#ffbd2e] rounded-full"></div>
<div class="w-3 h-3 bg-[#27c93f] rounded-full"></div>
</div>
<div>M4y4nky’s OSINT</div>
<div id="theme-toggle" class="cursor-pointer">☀️</div>
</div>

<div class="p-6 text-sm">

<p class="dim text-xs">
Last login: <span id="time"></span> on ttys001
</p>

<!-- OSINT -->
<div class="mt-6">
<p class="cmd">osint-scan</p>

<div class="flex flex-wrap gap-2 mt-3">
<select id="type">
<option value="phone">phone</option>
<option value="github">github</option>
<option value="telegram">telegram</option>
</select>

<input id="query" placeholder="Enter target">

<button onclick="scan()">run</button>

<label class="text-xs">
<input type="checkbox" id="rawToggle"> raw
</label>
</div>

<div id="output" class="output"></div>
</div>

</div>
</div>

<script>
document.getElementById("time").innerText=new Date().toLocaleString();

document.getElementById("theme-toggle").onclick=()=>{
document.body.classList.toggle("light-mode");
};

async function scan(){
const type=document.getElementById("type").value;
const query=document.getElementById("query").value.trim();
const raw=document.getElementById("rawToggle").checked;
const out=document.getElementById("output");

if(!query){
out.innerText="Enter target value";
return;
}

out.innerText="Scanning...\n";

try{

const url=`https://osint-backend-black.vercel.app/api/osint?type=${type}&value=${encodeURIComponent(query)}`;
const res=await fetch(url);

if(!res.ok){
throw new Error("Backend returned "+res.status);
}

const data=await res.json();

if(raw){
out.innerText=JSON.stringify(data,null,2);
return;
}

/* ================= PHONE ================= */
if(type==="phone"){

if(!data.status || !data.results || data.results.length===0){
out.innerText="No phone data found";
return;
}

let outputText="PHONE INTELLIGENCE\n\n";
outputText+="Status: SUCCESS\n";
outputText+="Profiles Found: "+data.results.length+"\n\n";

data.results.forEach((p,index)=>{

let cleanAddress="";
let city="";
let state="";
let pincode="";

if(p.address){
let parts=p.address.replace(/!!/g,"!").split("!");
if(parts.length>=3){
city=parts[parts.length-3]||"";
state=parts[parts.length-2]||"";
pincode=parts[parts.length-1]||"";
cleanAddress=parts.slice(0,parts.length-3).join(", ");
}
}

outputText+=`--- Profile ${index+1} ---\n`;
outputText+=`Mobile: ${p.mobile||"N/A"}\n`;
outputText+=`Name: ${p.name||"N/A"}\n`;
outputText+=`Father Name: ${p.fname||"N/A"}\n`;
outputText+=`Circle: ${p.circle||"N/A"}\n`;
outputText+=`Government ID: ${p.id||"N/A"}\n`;
outputText+=`Alternate Number: ${p.alt||"N/A"}\n`;
if(p.email){ outputText+=`Email: ${p.email}\n`; }
outputText+=`Address: ${cleanAddress}\n`;
outputText+=`City: ${city}\n`;
outputText+=`State: ${state}\n`;
outputText+=`Pincode: ${pincode}\n\n`;
});

out.innerText=outputText;
}

/* ================= GITHUB ================= */
if(type==="github"){
if(data.message==="Not Found"){
out.innerText="GitHub user not found";
return;
}

out.innerText=
`GITHUB PROFILE

Username: ${data.login}
Name: ${data.name||"N/A"}
Followers: ${data.followers}
Repos: ${data.public_repos}
Joined: ${new Date(data.created_at).toDateString()}
Last Updated: ${new Date(data.updated_at).toDateString()}
Profile: ${data.html_url}`;
}

/* ================= TELEGRAM ================= */
if(type==="telegram"){

let tg=data?.data?.data||data?.data||data;

if(!tg || !tg.id){
out.innerText="Telegram user not found";
return;
}

let outputText="TELEGRAM INTELLIGENCE\n\n";

outputText+=`Name: ${tg.first_name||""} ${tg.last_name||""}\n`;
outputText+=`User ID: ${tg.id}\n`;
outputText+=`Active: ${tg.is_active}\n`;
outputText+=`Is Bot: ${tg.is_bot}\n\n`;

outputText+=`Total Groups: ${tg.total_groups||0}\n`;
outputText+=`Admin In Groups: ${tg.adm_in_groups||0}\n`;
outputText+=`Group Messages: ${tg.msg_in_groups_count||0}\n`;
outputText+=`Total Messages: ${tg.total_msg_count||0}\n`;
outputText+=`Names Count: ${tg.names_count||0}\n`;
outputText+=`Usernames Count: ${tg.usernames_count||0}\n\n`;

if(tg.first_msg_date){
outputText+=`First Message: ${new Date(tg.first_msg_date).toLocaleString()}\n`;
}
if(tg.last_msg_date){
outputText+=`Last Message: ${new Date(tg.last_msg_date).toLocaleString()}\n`;
}

out.innerText=outputText;
}

}catch(err){
out.innerText="Error: "+err.message;
}
}
</script>

</body>
</html>
