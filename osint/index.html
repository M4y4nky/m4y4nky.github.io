<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4Y4NKY OSINT TERMINAL</title>
    <style>
        body { background: #010409; color: #39ff14; font-family: 'Courier New', monospace; padding: 10px; margin: 0; }
        .box { max-width: 850px; margin: 15px auto; border: 1px solid #30363d; border-radius: 12px; padding: 20px; background: #0d1117; box-shadow: 0 0 15px rgba(57,255,20,0.1); }
        h3 { text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 15px; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        input, select, button { background: #161b22; color: #39ff14; border: 1px solid #30363d; padding: 12px; border-radius: 6px; font-size: 15px; outline: none; }
        button { background: #238636; color: white; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #2ea043; box-shadow: 0 0 10px #238636; }
        #input-hint { font-size: 11px; color: #888; margin-top: 5px; padding-left: 5px; }
        .img-container { display: flex; justify-content: center; width: 100%; margin: 15px 0; }
        .profile-pic { width: 120px; height: 120px; border: 3px solid #39ff14; border-radius: 50%; display: none; object-fit: cover; box-shadow: 0 0 10px #39ff14; }
        #json-view { margin-top: 20px; background: #000; padding: 15px; border: 1px dashed #30363d; border-radius: 6px; white-space: pre-wrap; overflow-x: auto; font-size: 13px; color: #00ff00; min-height: 250px; text-align: left; line-height: 1.8; }
        .result-item { margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px dashed #30363d; }
        .result-item:last-child { border-bottom: none; }
        @media (min-width: 600px) { .controls { flex-direction: row; } select, input { flex: 1; } button { flex: 0.5; } }
    </style>
</head>
<body>
    <div class="box">
        <h3>💠 M4Y4NKY OSINT TERMINAL</h3>
        <div class="controls">
            <select id="api_cmd" onchange="updateHint()">
                <option value="num">📱 PHONE (IN)</option>
                <option value="gh">📂 GITHUB</option>
                <option value="insta">📸 INSTAGRAM</option>
                <option value="tg">💬 TELEGRAM</option>
                <option value="pak">🇵🇰 PAKISTAN NUM</option>
                <option value="ip">🌐 IP LOOKUP</option>
                <option value="ifsc">🏦 IFSC SEARCH</option>
                <option value="pincode">📍 PINCODE</option>
                <option value="email">📧 EMAIL CHECK</option>
                <option value="ff">🎮 FREE FIRE</option>
            </select>
            <div style="flex: 1; display: flex; flex-direction: column;">
                <input type="text" id="api_query" placeholder="Enter 10 digit number...">
                <div id="input-hint">Hint: e.g. 9876543210</div>
            </div>
            <button id="search_btn">RUN SEARCH</button>
        </div>
        <div class="img-container">
            <img id="p-img" class="profile-pic" src="" alt="Profile">
        </div>
        <div id="json-view">// Terminal Ready...</div>
    </div>

    <script>
        const apiNames = { "num": "NUMBER", "gh": "GITHUB", "insta": "INSTAGRAM", "tg": "TELEGRAM", "pak": "PAKISTAN NUMBER", "ip": "IP LOOKUP", "ifsc": "IFSC SEARCH", "pincode": "PINCODE", "email": "EMAIL CHECK", "ff": "FREE FIRE" };

        function updateHint() {
            const cmd = document.getElementById('api_cmd').value;
            const input = document.getElementById('api_query');
            const hint = document.getElementById('input-hint');
            const hints = {
                "num": { p: "Enter 10 digit number...", h: "Hint: e.g. 9876543210", type: "tel", max: "10", numeric: true },
                "gh": { p: "Enter Github username...", h: "Hint: e.g. torvalds", type: "text", max: "39", numeric: false },
                "insta": { p: "Enter Instagram username...", h: "Hint: e.g. zuck", type: "text", max: "30", numeric: false },
                "tg": { p: "Enter Telegram UserID...", h: "Hint: e.g. 123456789", type: "tel", max: "12", numeric: true },
                "pak": { p: "Enter 11 digit Pak number...", h: "Hint: e.g. 03001234567", type: "tel", max: "11", numeric: true },
                "ip": { p: "Enter IP Address...", h: "Hint: e.g. 8.8.8.8", type: "text", max: "45", numeric: false },
                "ifsc": { p: "Enter IFSC Code...", h: "Hint: e.g. SBIN0001234", type: "text", max: "11", numeric: false },
                "pincode": { p: "Enter 6 digit Pincode...", h: "Hint: e.g. 110001", type: "tel", max: "6", numeric: true },
                "email": { p: "Enter Email address...", h: "Hint: e.g. user@example.com", type: "email", max: "100", numeric: false },
                "ff": { p: "Enter Free Fire UID...", h: "Hint: e.g. 556677889", type: "tel", max: "12", numeric: true }
            };
            const config = hints[cmd];
            input.value = ""; input.placeholder = config.p; input.type = config.type; input.maxLength = config.max; hint.innerText = config.h;
            input.oninput = (e) => { if (config.numeric) e.target.value = e.target.value.replace(/[^0-9]/g, ''); };
        }

        const emojiMap = { "fname": "👨‍👦", "mname": "👩‍👦", "mobile": "📱", "alt": "🔢", "address": "🏠", "city": "🌆", "state": "🗺️", "pincode": "📍", "email": "📧", "status": "✅", "circle": "🌐", "username": "📛", "followerscount": "👥", "followingcount": "🏃", "totalposts": "📸" };
        const hiddenKeys = ["api", "buykey", "developer", "credit", "owner", "key", "telegram", "author", "apiversion", "api_version", "success", "service", "totalapiusages", "total_api_usages", "timestamp", "processingtime", "processingtime_ms", "processing_time_ms", "source", "input", "keyused", "server", "message", "error", "failurecode", "failure_code", "breachesfound"];

        document.addEventListener('DOMContentLoaded', () => { updateHint(); document.getElementById('search_btn').addEventListener('click', executeSearch); });

        async function executeSearch() {
            const cmd = document.getElementById('api_cmd').value;
            const q = document.getElementById('api_query').value;
            const display = document.getElementById('json-view');
            const img = document.getElementById('p-img');
            if(!q) return alert("Bhai, data toh daalo!");
            img.style.display = "none";
            display.innerHTML = `<div style="color:#888">🔍 Running deep scan...</div>`;
            try {
                const res = await fetch(`https://m4y4nky-api.m4y4nky.workers.dev/?cmd=${cmd}&q=${q}`);
                const data = await res.json();
                let formattedOutput = `<div><b style="color:white; font-size:16px;">✨ ${apiNames[cmd]} RESULTS ✨</b><br><br>`;

                function renderResults(dataObj) {
                    if (!dataObj || (dataObj.success === false)) return "";
                    if (Array.isArray(dataObj)) return dataObj.map(item => `<div class="result-item">${processData(item)}</div>`).join('');
                    if (dataObj.data && Array.isArray(dataObj.data)) return dataObj.data.map(item => `<div class="result-item">${processData(item)}</div>`).join('');
                    const single = processData(dataObj);
                    return single.length > 0 ? `<div class="result-item">${single}</div>` : "";
                }

                function processData(obj) {
                    let html = "";
                    for (let key in obj) {
                        let val = obj[key];
                        let cleanKey = key.replace(/^[^a-zA-Z0-9]+/, '').replace(/[^a-zA-Z0-9\s]/g, ' ').trim();
                        let lowerKey = cleanKey.toLowerCase();
                        let keyNoSpace = lowerKey.replace(/\s+/g, '');

                        if (lowerKey.includes("profile pic") || lowerKey.includes("avatar url") || lowerKey.includes("imagebase64") || lowerKey.includes("avatar_url")) {
                            if (val && (val.toString().startsWith("http") || val.toString().startsWith("data:image"))) {
                                img.src = val; img.style.display = "block";
                            }
                            continue;
                        }

                        if (hiddenKeys.includes(keyNoSpace) || (typeof val === 'string' && (val.includes('@DEVIL') || val.includes('upgrade plan') || val.toLowerCase().includes('failed to fetch') || val.toLowerCase().includes('not found')))) continue;

                        if (val && typeof val === 'object' && !Array.isArray(val)) {
                            html += processData(val); 
                        } else if (val !== null && val !== "" && typeof val !== 'boolean' && !Array.isArray(val)) {
                            // ID emoji updated to blue diamond
                            let noEmojiKeys = ["name", "fullname"];
                            let emoji = noEmojiKeys.includes(keyNoSpace) ? "" : (keyNoSpace === "id" ? "🔹" : (emojiMap[keyNoSpace] || "🔹"));
                            html += `<b>${emoji} ${cleanKey.toUpperCase()}:</b> <span style="color:white">${val}</span><br>`;
                        } else if (Array.isArray(val)) {
                            html += processData(val);
                        }
                    }
                    return html;
                }

                const finalHtml = renderResults(data);
                display.innerHTML = formattedOutput + (finalHtml || `<span style="color:red">⚠️ USER NOT FOUND.</span>`) + `<br><div style="border-top:1px solid #30363d; padding-top:10px; color:#555; font-size:11px;">🤖 M4y4nky-OSINT Terminal v1.0</div></div>`;
            } catch (e) { display.innerHTML = "<span style='color:red'>❌ Connection Failed.</span>"; }
        }
    </script>
</body>
</html>
