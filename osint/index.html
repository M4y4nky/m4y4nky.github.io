<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4Y4NKY'S OSINT V1.0 - Debug Mode</title>
    <style>
        :root { --bg: #0b0d15; --accent: #89b4fa; --border: rgba(137, 180, 250, 0.2); --text: #cdd6f4; --red: #f38ba8; }
        body { background: #000; color: var(--text); font-family: monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .window { width: 95%; max-width: 500px; height: 90vh; border: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg); border-radius: 10px; overflow: hidden; }
        .screen { flex: 1; padding: 20px; overflow-y: auto; font-size: 12px; }
        .search-area { padding: 15px; background: #11111b; border-top: 1px solid var(--border); display: flex; gap: 5px; }
        input, select, button { background: #1e1e2e; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 5px; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        .log-entry { margin-bottom: 5px; border-left: 2px solid var(--dim); padding-left: 8px; }
        .log-success { border-color: #a6e3a1; color: #a6e3a1; }
        .log-error { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>
<div class="window">
    <div class="screen" id="screen">
        <div style="color:var(--accent); font-weight:bold;">M4Y4NKY'S OSINT [DEBUG_ENABLED]</div>
        <div id="debug-status" style="font-size:10px; color:gray;">System logs will appear here...</div>
        <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
    </div>
    <div class="search-area">
        <select id="module">
            <option value="phone">PHONE</option>
            <option value="github">GITHUB</option>
            <option value="telegram">TELEGRAM</option>
        </select>
        <input id="target" type="text" placeholder="Target ID...">
        <button onclick="startSearch()">SCAN</button>
    </div>
</div>

<script>
    const screen = document.getElementById("screen");
    const PROXY_URL = "https://osint-backend-black.vercel.app/api/osint";

    function log(msg, type = '') {
        const div = document.createElement("div");
        div.className = `log-entry ${type}`;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        screen.appendChild(div);
        screen.scrollTop = screen.scrollHeight;
        console.log(`[OSINT_LOG]: ${msg}`);
    }

    async function startSearch() {
        const type = document.getElementById("module").value;
        const value = document.getElementById("target").value.trim();
        if(!value) return;

        log(`Initiating uplink for ${type.toUpperCase()}: ${value}...`);

        try {
            log(`Fetching from: ${PROXY_URL}?type=${type}&value=${value}`);
            
            const startTime = performance.now();
            const res = await fetch(`${PROXY_URL}?type=${type}&value=${value}`);
            const duration = (performance.now() - startTime).toFixed(2);

            log(`Response received in ${duration}ms. Status: ${res.status}`);

            const data = await res.json();

            if (res.ok) {
                log(`Data parsed successfully.`, 'log-success');
                screen.innerHTML += `<pre style="background:rgba(255,255,255,0.05); padding:10px; font-size:11px;">${JSON.stringify(data, null, 2)}</pre>`;
            } else {
                log(`Server returned error: ${data.message || 'Unknown Error'}`, 'log-error');
                screen.innerHTML += `<div class="log-error">Detail: ${JSON.stringify(data)}</div>`;
            }
        } catch (e) {
            log(`CRITICAL FETCH ERROR: ${e.message}`, 'log-error');
            log(`Possible reasons: CORS, Backend Offline, or Network Timeout.`);
        }
    }
</script>
</body>
</html>
