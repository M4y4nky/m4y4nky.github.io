<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4y4nky OSINT</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:25px 10px;
}

.terminal{
    width:95%;
    max-width:900px;
    background:#111;
    border-radius:12px;
    box-shadow:0 0 25px #000;
    overflow:hidden;
}

.header{
    background:#1e1e1e;
    padding:10px;
    display:flex;
    align-items:center;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    margin-right:6px;
}
.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

.title{
    color:#aaa;
    margin-left:15px;
}

.screen{
    height:420px;
    overflow-y:auto;
    padding:15px;
    color:#ddd;
    white-space:pre-wrap;
}

.input-line{
    display:flex;
    padding:12px 15px;
    border-top:1px solid #222;
}

.prompt{
    color:#00ff88;
    margin-right:6px;
}

input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:#3aa0ff;
    font-family:monospace;
}
</style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <div class="title">M4y4nky's OSINT terminal</div>
    </div>

    <div class="screen" id="screen">
Type help to begin.
    </div>

    <div class="input-line">
        <div class="prompt">m4y4nky@system:~$</div>
        <input id="cmd" autocomplete="off" autofocus>
    </div>
</div>

<script>
const screen = document.getElementById("screen");
const input = document.getElementById("cmd");

function print(txt=""){
    screen.innerHTML += txt + "\n";
    screen.scrollTop = screen.scrollHeight;
}

function space(lines=1){
    for(let i=0;i<lines;i++){
        screen.innerHTML += "\n";
    }
}

input.addEventListener("keydown", async function(e){
    if(e.key==="Enter"){
        let cmd=input.value.trim().toLowerCase();
        input.value="";
        print("m4y4nky@system:~$ "+cmd);
        await run(cmd);
    }
});

async function run(cmd){

if(cmd==="help"){
    print("phone <10digit>");
    print("telegram <id>");
    print("github <username>");
    space();
    return;
}

if(cmd.startsWith("phone ")){
    await phoneLookup(cmd.split(" ")[1]);
}

else if(cmd.startsWith("telegram ")){
    await telegramLookup(cmd.split(" ")[1]);
}

else if(cmd.startsWith("github ")){
    await githubLookup(cmd.split(" ")[1]);
}

else{
    print("unknown command");
    space();
}
}

/* ================= PHONE ================= */

async function phoneLookup(num){

print("Scanning...\n");

const res=await fetch(`https://osint-backend-black.vercel.app/api/osint?type=phone&value=${num}`);
const data=await res.json();

if(!data.status || !data.results){
    print("No data found\n");
    return;
}

print("PHONE INTELLIGENCE");
print("Profiles Found: "+data.results.length);
space();

for(let i=0;i<data.results.length;i++){

let p=data.results[i];

print("------ PROFILE "+(i+1)+" ------");
space();

print("Mobile: "+(p.mobile||"N/A"));
print("Name: "+(p.name||"N/A"));
print("Father Name: "+(p.fname||"N/A"));
print("Circle: "+(p.circle||"N/A"));
print("Government ID: "+(p.id||"N/A"));
print("Alternative Number: "+(p.alt||"N/A"));
print("Email: "+(p.email||"N/A"));

let clean=p.address?.replace(/!/g,", ").replace(/\s+/g," ");
print("Address: "+(clean||"N/A"));

let pin=clean?.match(/\b\d{6}\b/);
if(pin){
    await pincodeLookup(pin[0]);
}

space(2);
}
}

/* ================= PINCODE ================= */

async function pincodeLookup(pin){
try{
let r=await fetch("https://api.postalpincode.in/pincode/"+pin);
let j=await r.json();
if(j[0].Status==="Success"){
let post=j[0].PostOffice[0];
print("City: "+post.Region);
print("District: "+post.District);
print("State: "+post.State);
print("Pincode: "+pin);
}
}catch{}
}

/* ================= TELEGRAM ================= */

async function telegramLookup(id){

print("Scanning...\n");

let res=await fetch(`https://osint-backend-black.vercel.app/api/osint?type=telegram&value=${id}`);
let d=await res.json();

let tg=d?.data?.data||d?.data||d;

if(!tg?.id){
print("User not found\n");
return;
}

print("TELEGRAM INTELLIGENCE");
print("User ID: "+tg.id);
print("First Name: "+(tg.first_name||"N/A"));
print("Total Groups: "+tg.total_groups);
print("Admin In Groups: "+tg.adm_in_groups);
print("Total Messages: "+tg.total_msg_count);
print("First Message: "+formatTime(tg.first_msg_date));
print("Last Message: "+formatTime(tg.last_msg_date));
space();
}

/* ================= GITHUB ================= */

async function githubLookup(user){

print("Scanning...\n");

let res=await fetch(`https://osint-backend-black.vercel.app/api/osint?type=github&value=${user}`);
let g=await res.json();

if(g.message==="Not Found"){
print("User not found\n");
return;
}

print("GITHUB PROFILE");
print("Username: "+g.login);
print("Name: "+(g.name||"N/A"));
print("Followers: "+g.followers);
print("Public Repos: "+g.public_repos);
print("Created: "+formatTime(g.created_at));
print("Last Updated: "+formatTime(g.updated_at));
print("Email: "+(g.commit_email||"N/A"));
print("Profile: "+g.html_url);
space();
}

/* ================= TIME ================= */

function formatTime(date){
if(!date) return "N/A";
let d=new Date(date);
let diff=(new Date()-d)/1000;

if(diff>31536000) return d.toDateString()+" ("+Math.floor(diff/31536000)+" year ago)";
if(diff>2592000) return d.toDateString()+" ("+Math.floor(diff/2592000)+" month ago)";
if(diff>86400) return d.toDateString()+" ("+Math.floor(diff/86400)+" day ago)";
if(diff>3600) return d.toDateString()+" ("+Math.floor(diff/3600)+" hour ago)";
return d.toDateString()+" ("+Math.floor(diff/60)+" minute ago)";
}

</script>

</body>
</html>
