<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4y4nky’s OSINT</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
html,body{
margin:0;
height:100%;
background:radial-gradient(circle at top,#1a1a1a 0%,#0c0c0c 70%);
font-family:ui-monospace,Menlo,monospace;
overflow:hidden;
}

.wrapper{
height:100dvh;
display:flex;
align-items:center;
justify-content:center;
padding:16px;
}

.terminal{
width:100%;
max-width:820px;
height:100%;
max-height:850px;
background:#000;
border-radius:16px;
border:1px solid #222;
box-shadow:0 40px 100px rgba(0,0,0,.7);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */
.header{
background:linear-gradient(#2b2b2b,#1d1d1d);
padding:10px 14px;
display:flex;
align-items:center;
justify-content:space-between;
font-size:13px;
border-bottom:1px solid #222;
}

.dots{display:flex;gap:6px;}
.dot{width:12px;height:12px;border-radius:50%;}
.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

.console{
flex:1;
overflow-y:auto;
padding:16px;
font-size:14px;
color:#e5e5e5;
line-height:1.6;
scroll-behavior:smooth;
}

.input-bar{
display:flex;
gap:8px;
align-items:center;
padding:14px;
border-top:1px solid #222;
background:#000;
}

.prompt{color:#00ff88;font-weight:600;}
input{
flex:1;
background:transparent;
border:none;
outline:none;
color:#fff;
font-family:inherit;
font-size:14px;
}

/* COLORS */
.success{color:#00ff88;}
.error{color:#ff4d4d;}
.info{color:#4da6ff;}

@media(max-width:768px){
.wrapper{
padding:0;
}

.terminal{
border-radius:0;
max-height:none;
}

.console{
font-size:13px;
padding:14px;
}

.input-bar{
padding:12px;
}
}
</style>
</head>

<body>

<div class="wrapper">
<div class="terminal">

<div class="header">
<div class="dots">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
</div>
<div>M4y4nky’s OSINT</div>
<div class="text-gray-400 text-xs">secure mode</div>
</div>

<div id="console" class="console">
Type <span class="info">help</span> to begin.
</div>

<div class="input-bar">
<div class="prompt">m4y4nky@system:~$</div>
<input id="cmd" autocomplete="off" autofocus>
</div>

</div>
</div>

<script>

const consoleEl=document.getElementById("console");
const input=document.getElementById("cmd");

function print(text,className=""){
const line=document.createElement("div");
line.textContent=text;
if(className) line.className=className;
consoleEl.appendChild(line);
consoleEl.scrollTop=consoleEl.scrollHeight;
}

function validate(type,value){
if(type==="phone" && !/^[0-9]{10}$/.test(value))
return "Phone must be 10 digits";

if(type==="telegram" && !/^[0-9]+$/.test(value))
return "Telegram ID must be numeric";

if(type==="github" && !/^[a-z0-9-]+$/.test(value))
return "Invalid GitHub username";

return null;
}

async function execute(command){

command=command.trim();
if(!command) return;

print("m4y4nky@system:~$ "+command,"prompt");

const parts=command.split(/\s+/);

if(command==="help"){
print("Commands:","info");
print("phone <10digit>");
print("telegram <id>");
print("github <username>");
print("clear");
return;
}

if(command==="clear"){
consoleEl.innerHTML="";
return;
}

if(parts.length<2){
print("Usage: type value","error");
return;
}

const type=parts[0].toLowerCase();
const value=parts[1];

if(!["phone","telegram","github"].includes(type)){
print("Unknown command","error");
return;
}

const error=validate(type,value);
if(error){
print(error,"error");
return;
}

print("Scanning...","info");

try{
const url=`https://osint-backend-black.vercel.app/api/osint?type=${type}&value=${encodeURIComponent(value)}`;
const res=await fetch(url);

if(!res.ok){
print("Server error "+res.status,"error");
return;
}

const data=await res.json();

if(type==="phone"){
if(!data.status || !data.results?.length){
print("No phone data found","error");
return;
}
const p=data.results[0];
print("PHONE INTELLIGENCE","success");
print("Mobile: "+(p.mobile||"N/A"));
print("Name: "+(p.name||"N/A"));
print("Circle: "+(p.circle||"N/A"));
print("Government ID: "+(p.id||"N/A"));
if(p.email) print("Email: "+p.email);
}

if(type==="github"){
if(data.message==="Not Found"){
print("GitHub user not found","error");
return;
}
print("GITHUB PROFILE","success");
print("Username: "+data.login);
print("Repos: "+data.public_repos);
print("Followers: "+data.followers);
}

if(type==="telegram"){
let tg=data?.data?.data||data?.data||data;
if(!tg || !tg.id){
print("Telegram not found","error");
return;
}
print("TELEGRAM INTELLIGENCE","success");
print("Name: "+(tg.first_name||""));
print("User ID: "+tg.id);
print("Total Groups: "+(tg.total_groups||0));
print("Total Messages: "+(tg.total_msg_count||0));
}

}catch(e){
print("Error: "+e.message,"error");
}
}

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
execute(input.value);
input.value="";
}
});

</script>

</body>
</html>
