<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4Y4NKY OSINT v1.0</title>
    <style>
        /* Classic Terminal Theme */
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: auto; border: 1px solid #0f0; padding: 20px; border-radius: 5px; }
        h2 { text-align: center; font-size: 1.2rem; border-bottom: 1px solid #0f0; padding-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        input, select, button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; font-size: 14px; outline: none; }
        button { cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0f0; color: #000; }
        #output { margin-top: 20px; background: #000; padding: 10px; border: 1px dashed #0f0; white-space: pre-wrap; overflow-x: auto; font-size: 12px; min-height: 200px; }
        
        /* PC View */
        @media (min-width: 600px) { .input-group { flex-direction: row; } select, input { flex: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>💠 M4Y4NKY OSINT v1.0</h2>
        <div class="input-group">
            <select id="method">
                <option value="num">PHONE (IN)</option>
                <option value="gh">GITHUB</option>
                <option value="insta">INSTAGRAM</option>
                <option value="tg">TELEGRAM</option>
                <option value="pak">PAKISTAN NUM</option>
                <option value="ip">IP LOOKUP</option>
                <option value="ifsc">IFSC</option>
                <option value="pincode">PINCODE</option>
                <option value="email">EMAIL</option>
                <option value="ff">FREE FIRE</option>
            </select>
            <input type="text" id="target" placeholder="Enter target...">
            <button onclick="startScan()">SCAN</button>
        </div>
        <div id="output">// System Ready. Waiting for command...</div>
    </div>

    <script>
        async function startScan() {
            const m = document.getElementById('method').value;
            const t = document.getElementById('target').value;
            const out = document.getElementById('output');
            
            if(!t) return alert("Target missing!");
            out.innerText = ">> Initializing Scan...";

            try {
                // Connecting to your established Worker
                const response = await fetch(`https://m4y4nky-api.m4y4nky.workers.dev/?cmd=${m}&q=${t}`);
                const data = await response.json();
                
                // v1.0 Style: Direct Clean Formatting
                let resultText = `>> ${m.toUpperCase()} DATA FETCHED:\n\n`;
                
                function format(obj) {
                    for (let key in obj) {
                        if (typeof obj[key] === 'object' && obj[key] !== null) {
                            format(obj[key]);
                        } else {
                            // Filter out null/empty values only
                            if(obj[key]) resultText += `[+] ${key.toUpperCase()}: ${obj[key]}\n`;
                        }
                    }
                }
                
                format(data);
                out.innerText = resultText || ">> No Data Found.";
            } catch (e) {
                out.innerText = ">> ERROR: Connection Refused.";
            }
        }
    </script>
</body>
</html>
