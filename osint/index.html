<!DOCTYPE html>
<html>
<head>
  <title>OSINT AI Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    header {
      text-align: center;
      padding: 25px 15px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .wrapper {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border-radius: 14px;
      padding: 25px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    select, input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #111827;
      color: white;
      flex: 1;
      min-width: 150px;
    }

    button {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    .result {
      margin-top: 20px;
      background: #0f172a;
      padding: 18px;
      border-radius: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(59,130,246,0.4);
    }

    .loading {
      animation: blink 1s infinite;
      color: #facc15;
    }

    @keyframes blink {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    @media (max-width: 600px) {
      header {
        font-size: 18px;
      }
      .card {
        padding: 18px;
      }
    }
  </style>
</head>

<body>

<header>OSINT AI • FUTURE INTEL PANEL</header>

<div class="wrapper">
  <div class="card">

    <div class="controls">
      <select id="type">
        <option value="github">GitHub</option>
        <option value="pincode">Pincode</option>
        <option value="telegram">Telegram</option>
        <option value="ifsc">IFSC</option>
        <option value="ip">IP</option>
        <option value="email">Email</option>
        <option value="phone">Phone</option>
      </select>

      <input type="text" id="value" placeholder="Enter target...">

      <button onclick="scan()">Scan</button>
    </div>

    <div id="result" class="result">
Awaiting target input...
    </div>

  </div>
</div>

<script>

function scan() {

  const type = document.getElementById("type").value;
  const value = document.getElementById("value").value;
  const result = document.getElementById("result");

  if (!value) {
    result.textContent = "Please enter a value.";
    return;
  }

  result.innerHTML = `<span class="loading">Scanning ${value}...</span>`;

  fetch(`https://osint-backend-black.vercel.app/api/osint?type=${type}&value=${value}`)
    .then(res => res.json())
    .then(data => {
      result.textContent = JSON.stringify(data, null, 2);
    })
    .catch(() => {
      result.textContent = "Connection error.";
    });
}

</script>

</body>
</html>
