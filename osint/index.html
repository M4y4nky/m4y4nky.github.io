<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4Y4NKY OSINT TERMINAL</title>
    <style>
        body { background: #010409; color: #39ff14; font-family: 'Courier New', monospace; padding: 10px; margin: 0; }
        .box { max-width: 850px; margin: 15px auto; border: 1px solid #30363d; border-radius: 12px; padding: 20px; background: #0d1117; box-shadow: 0 0 15px rgba(57,255,20,0.1); }
        h3 { text-align: center; border-bottom: 1px solid #30363d; padding-bottom: 15px; }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        input, select, button { background: #161b22; color: #39ff14; border: 1px solid #30363d; padding: 12px; border-radius: 6px; font-size: 15px; outline: none; }
        button { background: #238636; color: white; cursor: pointer; font-weight: bold; border: none; }
        button:hover { background: #2ea043; box-shadow: 0 0 10px #238636; }
        
        /* Profile Image Centering Logic */
        .img-container { display: flex; justify-content: center; width: 100%; margin: 15px 0; }
        .profile-pic { width: 120px; height: 120px; border: 3px solid #39ff14; border-radius: 50%; display: none; object-fit: cover; box-shadow: 0 0 10px #39ff14; }

        #json-view { margin-top: 20px; background: #000; padding: 15px; border: 1px dashed #30363d; border-radius: 6px; white-space: pre-wrap; overflow-x: auto; font-size: 13px; color: #00ff00; min-height: 250px; text-align: left; line-height: 1.8; }
        @media (min-width: 600px) { .controls { flex-direction: row; } select, input { flex: 1; } button { flex: 0.5; } }
    </style>
</head>
<body>
    <div class="box">
        <h3>💠 M4Y4NKY OSINT TERMINAL</h3>
        <div class="controls">
            <select id="api_cmd">
                <option value="num">📱 PHONE (IN)</option>
                <option value="gh">📂 GITHUB</option>
                <option value="insta">📸 INSTAGRAM</option>
                <option value="tg">💬 TELEGRAM</option>
                <option value="pak">🇵🇰 PAKISTAN NUM</option>
                <option value="ip">🌐 IP LOOKUP</option>
                <option value="ifsc">🏦 IFSC SEARCH</option>
                <option value="pincode">📍 PINCODE</option>
                <option value="email">📧 EMAIL CHECK</option>
                <option value="ff">🎮 FREE FIRE</option>
            </select>
            <input type="text" id="api_query" placeholder="Enter target data...">
            <button id="search_btn">RUN SEARCH</button>
        </div>
        
        <div class="img-container">
            <img id="p-img" class="profile-pic" src="" alt="Profile">
        </div>

        <div id="json-view">// Terminal Ready...</div>
    </div>

    <script>
        const emojiMap = {
            "name": "👤", "fname": "👨‍👦", "mname": "👩‍👦", "mobile": "📱",
            "alt": "🔢", "id": "🆔", "address": "🏠", "city": "🌆",
            "state": "🗺️", "pincode": "📍", "email": "📧", "status": "✅",
            "dob": "📅", "gender": "🚻", "username": "📛", "bio": "📝", 
            "followerscount": "👥", "followingcount": "🏃", "fullname": "👤", "totalposts": "📄"
        };

        // Strict Filter to remove technical logs
        const hiddenKeys = [
            "api", "buy key", "developer", "credit", "owner", "key", 
            "telegram", "author", "api version", "api_version", "success", 
            "service", "total api usages", "total_api_usages", "timestamp", 
            "processing time ms", "processing_time_ms"
        ];

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('search_btn').addEventListener('click', executeSearch);
        });

        async function executeSearch() {
            const cmd = document.getElementById('api_cmd').value;
            const q = document.getElementById('api_query').value;
            const display = document.getElementById('json-view');
            const img = document.getElementById('p-img');
            
            if(!q) return alert("Bhai, data toh daalo!");
            
            // Reset UI
            img.style.display = "none";
            display.innerHTML = `<div style="color:#888">🔍 Scanning secure terminal...</div>`;
            
            try {
                const res = await fetch(`https://m4y4nky-api.m4y4nky.workers.dev/?cmd=${cmd}&q=${q}`);
                const data = await res.json();
                
                let formattedOutput = `<div><b style="color:white; font-size:16px;">✨ ${cmd.toUpperCase()} RESULTS ✨</b><br><br>`;

                function processData(obj) {
                    let html = "";
                    for (let key in obj) {
                        let val = obj[key];
                        let lowerKey = key.toLowerCase();

                        // Centered Profile Picture Logic
                        if (lowerKey.includes("imagebase64") || lowerKey.includes("profile_pic") || lowerKey.includes("profileimage")) {
                            if (val && val.length > 50) {
                                img.src = val;
                                img.style.display = "block";
                            }
                            continue;
                        }

                        // Hide technical/promotional lines
                        if (hiddenKeys.includes(lowerKey) || (typeof val === 'string' && (val.includes('@DEVIL') || val.includes('upgrade plan')))) {
                            continue;
                        }

                        if (val && typeof val === 'object') {
                            html += processData(val); 
                        } else if (val !== null && val !== "" && typeof val !== 'boolean') {
                            let emoji = emojiMap[lowerKey] || "🔹";
                            let cleanKey = key.replace(/_/g, ' ').toUpperCase();
                            html += `<b>${emoji} ${cleanKey}:</b> <span style="color:white">${val}</span><br>`;
                        }
                    }
                    return html;
                }

                const finalHtml = processData(data);
                display.innerHTML = formattedOutput + (finalHtml || `<span style="color:red">⚠️ No Data Found.</span>`) + `<br><div style="border-top:1px solid #30363d; padding-top:10px; color:#555; font-size:11px;">🤖 M4y4nky-OSINT Terminal v1.0</div></div>`;

            } catch (e) {
                display.innerHTML = "<span style='color:red'>❌ Error: Terminal Connection Failed.</span>";
            }
        }
    </script>
</body>
</html>
