<!DOCTYPE html>
<html>
<head>
  <title>OSINT Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Consolas, monospace;
      background: #0a0a0a;
      color: #00ff88;
    }

    header {
      background: #000;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      border-bottom: 1px solid #00ff88;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .search-box {
      background: #111;
      padding: 15px;
      border: 1px solid #00ff88;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    select, input {
      padding: 8px;
      width: 60%;
      background: black;
      border: 1px solid #00ff88;
      color: #00ff88;
    }

    button {
      padding: 8px 14px;
      background: #00ff88;
      border: none;
      cursor: pointer;
      margin-left: 8px;
    }

    .card {
      background: #111;
      border: 1px solid #00ff88;
      padding: 15px;
      border-radius: 6px;
      margin-top: 15px;
      animation: fadeIn 0.3s ease-in-out;
    }

    .label {
      color: #aaa;
      font-size: 13px;
    }

    .value {
      color: white;
      margin-bottom: 10px;
      font-size: 15px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>

<header>OSINT TERMINAL v2.0</header>

<div class="container">

  <div class="search-box">
    <select id="type">
      <option value="github">GitHub</option>
      <option value="pincode">Pincode</option>
      <option value="telegram">Telegram</option>
      <option value="ifsc">IFSC</option>
      <option value="ip">IP</option>
      <option value="email">Email</option>
      <option value="phone">Phone</option>
    </select>

    <input type="text" id="value" placeholder="Enter value">
    <button onclick="search()">SCAN</button>
  </div>

  <div id="results"></div>

</div>
