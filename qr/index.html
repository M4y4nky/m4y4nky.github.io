<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">
    <h1>QR Code Generator</h1>
    <p class="subtitle">Generate and download QR codes instantly</p>

    <div class="input-group">
      <input id="text" placeholder="Enter text or URL">
      <button onclick="generateQR()">Generate</button>
    </div>

    <div id="qr"></div>

    <button id="download" onclick="downloadQR()">Download PNG</button>

    <p class="privacy">
      QR codes are generated locally. No data is stored.
    </p>
  </div>

  <!-- QR engine -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
