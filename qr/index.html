<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QR Code Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>QR Code Generator</h1>
    <p class="subtitle">
      Generate and download QR codes instantly
    </p>

    <input id="text" placeholder="Enter text or URL" />

    <button class="primary" onclick="generateQR()">
      Generate QR Code
    </button>

    <div id="qr"></div>

    <button
      id="download"
      class="secondary"
      style="display:none"
      onclick="downloadQR()">
      Download PNG
    </button>

    <p class="privacy">
      QR codes are generated locally. No data is stored.
    </p>
  </div>

  <!-- QR engine -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
